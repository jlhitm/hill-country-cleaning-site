<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>HCC Quote Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0f1a;
            --card: #141b2d;
            --card-hover: #1a2440;
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.3);
            --text: #f1f5f9;
            --text-muted: #64748b;
            --border: #1e293b;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            padding-bottom: 160px;
        }

        .header {
            text-align: center;
            padding: 16px 0 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .price-display {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            padding: 20px 16px 24px;
            z-index: 100;
        }

        .price-box {
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .price-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .price-amount {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .price-breakdown {
            text-align: right;
            font-size: 0.75rem;
            color: var(--text-muted);
            max-width: 140px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .button-grid-3 {
            grid-template-columns: repeat(3, 1fr);
        }

        .button-grid-2 {
            grid-template-columns: repeat(2, 1fr);
        }

        .btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .btn:hover {
            background: var(--card-hover);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-small-text {
            font-size: 0.8rem;
        }

        .btn-price {
            display: block;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn.active .btn-price {
            color: rgba(0,0,0,0.6);
        }

        .addon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .addon-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
        }

        .addon-btn .addon-name {
            font-size: 0.85rem;
        }

        .addon-btn .addon-price {
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 600;
        }

        .addon-btn.active .addon-price {
            color: rgba(0,0,0,0.7);
        }

        .extra-ba-section {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
        }

        .extra-ba-label {
            flex: 1;
            font-size: 0.9rem;
        }

        .extra-ba-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .extra-ba-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--card-hover);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .extra-ba-btn:active {
            transform: scale(0.95);
        }

        .extra-ba-count {
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        .reset-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 20px;
            position: relative;
            z-index: 50;
        }

        .reset-btn:active {
            background: var(--danger);
            color: white;
        }

        .reset-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        .service-type-indicator {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 8px;
            vertical-align: middle;
        }

        .indicator-standard { background: var(--accent); color: #000; }
        .indicator-deep { background: var(--warning); color: #000; }
        .indicator-moveout { background: var(--danger); color: white; }

        @media (max-width: 380px) {
            .button-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .btn {
                padding: 12px 6px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HCC LIVE QUOTE</h1>
    </div>

    <!-- Bedrooms -->
    <div class="section">
        <div class="section-title">Bedrooms</div>
        <div class="button-grid">
            <button class="btn" data-br="1" onclick="setBedrooms(1)">1 BR</button>
            <button class="btn" data-br="2" onclick="setBedrooms(2)">2 BR</button>
            <button class="btn" data-br="3" onclick="setBedrooms(3)">3 BR</button>
            <button class="btn" data-br="4" onclick="setBedrooms(4)">4 BR</button>
            <button class="btn" data-br="5" onclick="setBedrooms(5)">5 BR</button>
        </div>
    </div>

    <!-- Bathrooms -->
    <div class="section">
        <div class="section-title">Bathrooms</div>
        <div class="button-grid">
            <button class="btn" data-ba="1" onclick="setBathrooms(1)">1 BA</button>
            <button class="btn" data-ba="2" onclick="setBathrooms(2)">2 BA</button>
            <button class="btn" data-ba="3" onclick="setBathrooms(3)">3 BA</button>
            <button class="btn" data-ba="4" onclick="setBathrooms(4)">4 BA</button>
        </div>
    </div>

    <!-- Service Type -->
    <div class="section">
        <div class="section-title">Service Type</div>
        <div class="button-grid button-grid-3">
            <button class="btn active" data-service="standard" onclick="setService('standard')">
                Standard
            </button>
            <button class="btn" data-service="deep" onclick="setService('deep')">
                Deep Clean
                <span class="btn-price">1.75x</span>
            </button>
            <button class="btn" data-service="moveout" onclick="setService('moveout')">
                Move-Out
                <span class="btn-price">1.75x + $50</span>
            </button>
        </div>
    </div>

    <!-- Frequency -->
    <div class="section">
        <div class="section-title">Frequency</div>
        <div class="button-grid button-grid-2">
            <button class="btn" data-freq="weekly" onclick="setFrequency('weekly')">
                Weekly
                <span class="btn-price">-10%</span>
            </button>
            <button class="btn active" data-freq="biweekly" onclick="setFrequency('biweekly')">
                Bi-weekly
                <span class="btn-price">Base</span>
            </button>
            <button class="btn" data-freq="monthly" onclick="setFrequency('monthly')">
                Monthly
                <span class="btn-price">+5%</span>
            </button>
            <button class="btn" data-freq="onetime" onclick="setFrequency('onetime')">
                One-Time
                <span class="btn-price">+15%</span>
            </button>
        </div>
    </div>

    <div class="divider"></div>

    <!-- Add-ons -->
    <div class="section">
        <div class="section-title">Add-ons</div>
        <div class="addon-grid">
            <button class="btn addon-btn" data-addon="fridge" onclick="toggleAddon('fridge')">
                <span class="addon-name">Fridge</span>
                <span class="addon-price">+$30</span>
            </button>
            <button class="btn addon-btn" data-addon="oven" onclick="toggleAddon('oven')">
                <span class="addon-name">Oven</span>
                <span class="addon-price">+$30</span>
            </button>
            <button class="btn addon-btn" data-addon="windows" onclick="toggleAddon('windows')">
                <span class="addon-name">Windows</span>
                <span class="addon-price">+$35</span>
            </button>
            <button class="btn addon-btn" data-addon="cabinets" onclick="toggleAddon('cabinets')">
                <span class="addon-name">Cabinets</span>
                <span class="addon-price">+$30</span>
            </button>
            <button class="btn addon-btn" data-addon="laundry" onclick="toggleAddon('laundry')">
                <span class="addon-name">Laundry</span>
                <span class="addon-price">+$40</span>
            </button>
            <button class="btn addon-btn" data-addon="baseboards" onclick="toggleAddon('baseboards')">
                <span class="addon-name">Baseboards</span>
                <span class="addon-price">+$25</span>
            </button>
            <button class="btn addon-btn" data-addon="garage" onclick="toggleAddon('garage')">
                <span class="addon-name">Garage</span>
                <span class="addon-price">+$35</span>
            </button>
            <button class="btn addon-btn" data-addon="patio" onclick="toggleAddon('patio')">
                <span class="addon-name">Patio</span>
                <span class="addon-price">+$25</span>
            </button>
            <button class="btn addon-btn" data-addon="tile" onclick="toggleAddon('tile')">
                <span class="addon-name">Tile/Grout</span>
                <span class="addon-price">+$75</span>
            </button>
        </div>
    </div>

    <!-- Extra Bathrooms -->
    <div class="section">
        <div class="section-title">Extra Bathrooms (beyond typical)</div>
        <div class="extra-ba-section">
            <span class="extra-ba-label">+$20 each</span>
            <div class="extra-ba-controls">
                <button class="extra-ba-btn" onclick="adjustExtraBa(-1)">−</button>
                <span class="extra-ba-count" id="extraBaCount">0</span>
                <button class="extra-ba-btn" onclick="adjustExtraBa(1)">+</button>
            </div>
        </div>
    </div>

    <!-- Square Footage Adjustment -->
    <div class="section">
        <div class="section-title">Square Footage Adjustment</div>
        <div class="button-grid button-grid-3">
            <button class="btn btn-small-text" data-sqft="small" onclick="setSqft('small')">
                Smaller
                <span class="btn-price">-$25</span>
            </button>
            <button class="btn btn-small-text active" data-sqft="typical" onclick="setSqft('typical')">
                Typical
                <span class="btn-price">Base</span>
            </button>
            <button class="btn btn-small-text" data-sqft="larger" onclick="setSqft('larger')">
                Larger
                <span class="btn-price">+$25</span>
            </button>
        </div>
        <div class="button-grid" style="margin-top: 8px; grid-template-columns: 1fr;">
            <button class="btn btn-small-text" data-sqft="xlarge" onclick="setSqft('xlarge')">
                Much Larger (3,000+ sqft)
                <span class="btn-price">+$50</span>
            </button>
        </div>
    </div>

    <!-- Reset -->
    <button class="reset-btn" onclick="resetAll()">Reset All</button>

    <!-- Fixed Price Display -->
    <div class="price-display">
        <div class="price-box">
            <div>
                <div class="price-label">QUOTE</div>
                <div class="price-amount" id="totalPrice">$—</div>
            </div>
            <div class="price-breakdown" id="breakdown">
                Select BR/BA
            </div>
        </div>
    </div>

    <script>
        // PHASE 1 PRICING (0-15 reviews) - VERIFIED FROM PLAYBOOK
        const basePrices = {
            '1-1': 125,
            '2-1': 150,
            '2-2': 165,
            '3-2': 180,
            '3-3': 205,
            '4-2': 205,
            '4-3': 235,
            '5-3': 270,
            '5-4': 290
        };

        const addonPrices = {
            fridge: 30,
            oven: 30,
            windows: 35,
            cabinets: 30,
            laundry: 40,
            baseboards: 25,
            garage: 35,
            patio: 25,
            tile: 75
        };

        // State
        let state = {
            bedrooms: null,
            bathrooms: null,
            service: 'standard',
            frequency: 'biweekly',
            addons: [],
            extraBa: 0,
            sqft: 'typical'
        };

        function setBedrooms(br) {
            state.bedrooms = br;
            document.querySelectorAll('[data-br]').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.br) === br);
            });
            calculatePrice();
        }

        function setBathrooms(ba) {
            state.bathrooms = ba;
            document.querySelectorAll('[data-ba]').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.dataset.ba) === ba);
            });
            calculatePrice();
        }

        function setService(service) {
            state.service = service;
            document.querySelectorAll('[data-service]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.service === service);
            });
            calculatePrice();
        }

        function setFrequency(freq) {
            state.frequency = freq;
            document.querySelectorAll('[data-freq]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.freq === freq);
            });
            calculatePrice();
        }

        function setSqft(size) {
            state.sqft = size;
            document.querySelectorAll('[data-sqft]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sqft === size);
            });
            calculatePrice();
        }

        function toggleAddon(addon) {
            const idx = state.addons.indexOf(addon);
            if (idx > -1) {
                state.addons.splice(idx, 1);
            } else {
                state.addons.push(addon);
            }
            document.querySelectorAll('[data-addon]').forEach(btn => {
                btn.classList.toggle('active', state.addons.includes(btn.dataset.addon));
            });
            calculatePrice();
        }

        function adjustExtraBa(delta) {
            state.extraBa = Math.max(0, state.extraBa + delta);
            document.getElementById('extraBaCount').textContent = state.extraBa;
            calculatePrice();
        }

        function resetAll() {
            state = {
                bedrooms: null,
                bathrooms: null,
                service: 'standard',
                frequency: 'biweekly',
                addons: [],
                extraBa: 0,
                sqft: 'typical'
            };
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('[data-service="standard"]').classList.add('active');
            document.querySelector('[data-freq="biweekly"]').classList.add('active');
            document.querySelector('[data-sqft="typical"]').classList.add('active');
            document.getElementById('extraBaCount').textContent = '0';
            
            document.getElementById('totalPrice').textContent = '$—';
            document.getElementById('breakdown').textContent = 'Select BR/BA';
        }

        function getBasePrice(br, ba) {
            // Find the best matching price
            const key = `${br}-${ba}`;
            if (basePrices[key]) return basePrices[key];
            
            // Try lower bathroom count
            for (let b = ba; b >= 1; b--) {
                if (basePrices[`${br}-${b}`]) return basePrices[`${br}-${b}`];
            }
            
            // Fallback: interpolate/extrapolate
            if (br >= 5) return 270 + (ba - 3) * 20;
            return 125 + (br - 1) * 40 + (ba - 1) * 20;
        }

        function calculatePrice() {
            if (state.bedrooms === null || state.bathrooms === null) {
                document.getElementById('totalPrice').textContent = '$—';
                document.getElementById('breakdown').textContent = 'Select BR/BA';
                return;
            }

            let base = getBasePrice(state.bedrooms, state.bathrooms);
            let breakdownParts = [`${state.bedrooms}BR/${state.bathrooms}BA: $${base}`];

            // Service multiplier
            if (state.service === 'deep') {
                base = Math.round(base * 1.75);
                breakdownParts = [`Deep: $${base}`];
            } else if (state.service === 'moveout') {
                base = Math.round(base * 1.75) + 50;
                breakdownParts = [`Move-out: $${base}`];
            }

            // Frequency adjustment (applied to base, not addons)
            let freqAdjusted = base;
            if (state.frequency === 'weekly') {
                freqAdjusted = Math.round(base * 0.90);
                breakdownParts.push('Weekly -10%');
            } else if (state.frequency === 'monthly') {
                freqAdjusted = Math.round(base * 1.05);
                breakdownParts.push('Monthly +5%');
            } else if (state.frequency === 'onetime') {
                freqAdjusted = Math.round(base * 1.15);
                breakdownParts.push('One-time +15%');
            }

            let total = freqAdjusted;

            // Add-ons
            let addonTotal = 0;
            state.addons.forEach(addon => {
                addonTotal += addonPrices[addon];
            });
            if (addonTotal > 0) {
                total += addonTotal;
                breakdownParts.push(`Add-ons: +$${addonTotal}`);
            }

            // Extra bathrooms
            if (state.extraBa > 0) {
                const extraBaCost = state.extraBa * 20;
                total += extraBaCost;
                breakdownParts.push(`+${state.extraBa} BA: +$${extraBaCost}`);
            }

            // Square footage adjustment
            if (state.sqft === 'small') {
                total -= 25;
                breakdownParts.push('Smaller: -$25');
            } else if (state.sqft === 'larger') {
                total += 25;
                breakdownParts.push('Larger: +$25');
            } else if (state.sqft === 'xlarge') {
                total += 50;
                breakdownParts.push('Much larger: +$50');
            }

            document.getElementById('totalPrice').textContent = `$${total}`;
            document.getElementById('breakdown').innerHTML = breakdownParts.join('<br>');
        }

        // Initialize
        calculatePrice();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mr bean fan page</title>
  <meta name="description" content="mr bean fan page">
  <style>
    :root {
      --brown: #5a3a24;
      --tan: #f3dfbd;
      --yellow: #f7d84b;
      --red: #9d1d22;
      --ink: #15120f;
      --cream: #fff8e7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(247, 216, 75, 0.25), transparent 28rem),
        radial-gradient(circle at 80% 10%, rgba(157, 29, 34, 0.18), transparent 24rem),
        linear-gradient(135deg, #fff8e7 0%, #f3dfbd 100%);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    main {
      width: min(58rem, 100%);
      background: rgba(255, 255, 255, 0.72);
      border: 0.35rem solid var(--brown);
      border-radius: 2rem;
      box-shadow: 0 1.5rem 4rem rgba(90, 58, 36, 0.22);
      padding: clamp(1.25rem, 4vw, 3rem);
      text-align: center;
    }

    .portrait {
      width: min(18rem, 70vw);
      aspect-ratio: 1;
      margin: 0 auto 2rem;
      border-radius: 50%;
      background: var(--tan);
      border: 0.35rem solid var(--brown);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 -1rem 0 rgba(90, 58, 36, 0.08);
    }

    .hair {
      position: absolute;
      inset: 1.4rem 3.2rem auto;
      height: 4rem;
      background: var(--brown);
      border-radius: 60% 60% 35% 35%;
      transform: rotate(-4deg);
    }

    .ear {
      position: absolute;
      top: 7.2rem;
      width: 2.1rem;
      height: 3.4rem;
      background: var(--tan);
      border: 0.22rem solid var(--brown);
      border-radius: 50%;
    }

    .ear.left {
      left: 1.3rem;
    }

    .ear.right {
      right: 1.3rem;
    }

    .eye {
      position: absolute;
      top: 7.2rem;
      width: 1.3rem;
      height: 1.3rem;
      background: var(--ink);
      border-radius: 50%;
    }

    .eye.left {
      left: 6rem;
    }

    .eye.right {
      right: 6rem;
    }

    .brow {
      position: absolute;
      top: 6.4rem;
      width: 2.2rem;
      height: 0.35rem;
      background: var(--brown);
      border-radius: 1rem;
    }

    .brow.left {
      left: 5.55rem;
      transform: rotate(-12deg);
    }

    .brow.right {
      right: 5.55rem;
      transform: rotate(12deg);
    }

    .nose {
      position: absolute;
      top: 8.4rem;
      left: 50%;
      width: 1.4rem;
      height: 2.2rem;
      border: 0.22rem solid var(--brown);
      border-left: 0;
      border-top: 0;
      border-radius: 0 0 1rem 0;
      transform: translateX(-50%) rotate(8deg);
    }

    .mouth {
      position: absolute;
      top: 11.7rem;
      left: 50%;
      width: 3.8rem;
      height: 1.6rem;
      border-bottom: 0.32rem solid var(--red);
      border-radius: 50%;
      transform: translateX(-50%);
    }

    .tie {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 5rem;
      height: 4.5rem;
      background: var(--red);
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      transform: translateX(-50%);
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 0.9;
      letter-spacing: -0.07em;
      color: var(--brown);
    }

    p {
      max-width: 38rem;
      margin: 1.25rem auto 0;
      font-size: clamp(1.15rem, 2.2vw, 1.7rem);
      line-height: 1.45;
    }

    .beans {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .bean {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 8rem;
      min-height: 3.3rem;
      padding: 0.7rem 1.2rem;
      background: var(--yellow);
      border: 0.22rem solid var(--brown);
      border-radius: 999rem;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--brown);
      transform: rotate(var(--turn));
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .home {
      display: inline-block;
      margin-top: 2rem;
      font-weight: 800;
      color: var(--red);
    }
  </style>
</head>
<body>
  <main>
    <div class="portrait" aria-hidden="true">
      <div class="hair"></div>
      <div class="ear left"></div>
      <div class="ear right"></div>
      <div class="brow left"></div>
      <div class="brow right"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="nose"></div>
      <div class="mouth"></div>
      <div class="tie"></div>
    </div>

    <h1>mr bean</h1>
    <p>a very serious fan page for the least serious legend</p>
    <p>tiny car big face teddy best friend chaos forever</p>

    <div class="beans" aria-label="fan words">
      <span class="bean" style="--turn: -4deg">teddy</span>
      <span class="bean" style="--turn: 3deg">wibble</span>
      <span class="bean" style="--turn: -2deg">mini</span>
      <span class="bean" style="--turn: 4deg">legend</span>
    </div>

    <a class="home" href="/">back home</a>
  </main>
</body>
</html>
